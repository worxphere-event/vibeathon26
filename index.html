<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>잡코리아 바이브톤 응시생 모집</title>
<meta property="og:type" content="website">
<meta property="og:title" content="[무료] 삼시 세끼 챙겨주는 잡코리아 바이브톤">
<meta property="og:description" content="장원급제 시 상금 100만 원, 직무 제한 없이 누구나 응시 가능하오(~6/25까지)">
<meta property="og:image" content="https://worxphere-event.github.io/vibeathon26/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="600">
<meta property="og:url" content="https://worxphere-event.github.io/vibeathon26/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  @font-face {
    font-family: 'YeongyanggunEumsikdimibang';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2104@1.1/dimibang_new.woff') format('woff');
    font-weight: normal; font-display: swap;
  }
  :root{ --ink:#401504; --cream:#F6E9CD; --gray50:#F3E8CF; --g900:#2A1D12; --g500:#9C8A70; --border:#D8C6A4; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }  html,body { margin:0; padding:0; }
  body { font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#EBDCBC;
    background-image:radial-gradient(rgba(64,21,4,0.035) 1px, transparent 1px); background-size:5px 5px;
    color:var(--g900); -webkit-font-smoothing:antialiased; line-height:1.6; letter-spacing:-0.012em; }
  .dimibang { font-family:'YeongyanggunEumsikdimibang','Pretendard',serif; letter-spacing:0; }
  /* 탭/클릭 시 먹물 자국 */
  .ink-splat { position:fixed; z-index:9999; pointer-events:none; width:var(--s); height:var(--s); transform:translate(-50%,-50%); }
  .ink-splat::before { content:''; position:absolute; inset:0; background:var(--ink); border-radius:var(--r); animation:inkBlob .7s ease-out forwards; }
  .ink-splat i { position:absolute; left:50%; top:50%; background:var(--ink); border-radius:50%; animation:inkDrop .7s ease-out forwards; }
  @keyframes inkBlob { 0%{ transform:scale(.15); opacity:.6; } 60%{ opacity:.32; } 100%{ transform:scale(1); opacity:0; } }
  @keyframes inkDrop { 0%{ transform:translate(-50%,-50%); opacity:.55; } 100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))); opacity:0; } }
  .wrap { max-width:480px; margin:0 auto; min-height:100vh; background:#FBF5E6; box-shadow:0 0 40px rgba(64,21,4,.12); border-left:1px solid var(--border); border-right:1px solid var(--border); }

  /* 랜딩 통이미지 (텍스트 추가 없음) */
  .landing img { display:block; width:100%; height:auto; }

  /* 영상 섹션 (추후 삽입) */
  .video-sec { padding:32px 24px; }
  .video-box { position:relative; width:100%; aspect-ratio:16/9; background:var(--gray50); border:1.5px dashed var(--border); border-radius:16px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .video-box iframe, .video-box video { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .video-ph { color:var(--g500); font-size:14px; text-align:center; }

  /* 하단 신청 버튼 */
  .apply-sec { padding:32px 24px 140px; }
  .apply-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:64px; background:var(--ink); color:#fff; border-radius:64px; font-size:24px; text-decoration:none; transition:background .15s, transform .15s; }
  .apply-btn:hover { background:#5A2E14; }
  .apply-btn:active { transform:scale(.99); }
  .share-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:52px; margin-top:12px; background:#fff; border:1.5px solid var(--ink); border-radius:64px; color:var(--ink); font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .15s; }
  .share-btn:hover { background:var(--cream); }
  .toast { position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:rgba(42,29,18,.92); color:#fff; padding:12px 20px; border-radius:24px; font-size:14px; z-index:90; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; }

  /* 우하단 플로팅 (공유 / 맨위로) */
  .fab-stack { position:fixed; right:max(20px, calc(50% - 330px)); bottom:84px; z-index:80; display:flex; flex-direction:column; gap:12px; }
  .fab { width:52px; height:52px; border-radius:50%;
    background:linear-gradient(145deg, #5A2E14 0%, var(--ink) 60%);
    color:var(--cream); border:1px solid rgba(246,233,205,.25);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(64,21,4,.32), inset 0 1px 0 rgba(255,255,255,.14);
    cursor:pointer; transition:transform .18s, box-shadow .18s, opacity .25s, visibility .25s; }
  .fab:hover { transform:translateY(-2px); box-shadow:0 10px 24px rgba(64,21,4,.4), inset 0 1px 0 rgba(255,255,255,.14); }
  .fab:active { transform:scale(.92); }
  .fab svg { width:20px; height:20px; }
  .fab-top { opacity:0; visibility:hidden; }
  .fab-top.show { opacity:1; visibility:visible; }

  /* sticky 신청 버튼 */
  .sticky-cta { position:fixed; left:50%; transform:translateX(-50%); bottom:20px; width:calc(100% - 48px); max-width:432px; z-index:50; height:60px; border-radius:64px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-size:20px; text-decoration:none; box-shadow:0 8px 24px rgba(64,21,4,.35); transition:opacity .2s, visibility .2s, background .15s; }
  .sticky-cta:hover { background:#5A2E14; }
  .sticky-cta.hide { opacity:0; visibility:hidden; }

  /* 우측 영상 팝업 (광고처럼 떠서 재생 + 닫기) */
  .vid-pop { position:fixed; left:max(18px, calc(50% - 486px)); bottom:128px; width:232px; background:#FBF5E6; border:1.5px solid var(--ink); border-radius:14px; box-shadow:0 12px 34px rgba(64,21,4,.38); z-index:70; overflow:hidden; transition:opacity .25s, transform .25s; }
  .vid-pop.hide { opacity:0; transform:translateY(10px); pointer-events:none; }
  .vid-pop-head { display:flex; align-items:center; justify-content:space-between; padding:9px 8px 9px 13px; background:var(--ink); color:#fff; font-size:13px; font-weight:600; cursor:move; user-select:none; touch-action:none; }
  .vid-pop-head .grip { font-size:11px; opacity:.7; margin-right:5px; }
  .vid-pop-close { background:none; border:none; color:#fff; font-size:20px; line-height:1; cursor:pointer; padding:0 6px; }
  .vid-pop-body { aspect-ratio:9/16; background:#000; position:relative; }
  .vid-mute { position:absolute; right:8px; bottom:8px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; border:none; font-size:15px; cursor:pointer; z-index:2; display:flex; align-items:center; justify-content:center; }
  .vid-pop-body iframe, .vid-pop-body video { width:100%; height:100%; border:0; display:block; }
  .vid-ph { display:flex; align-items:center; justify-content:center; height:100%; color:#9C8A70; font-size:13px; background:var(--gray50); }
  @media (max-width:520px){ .vid-pop{ display:none; } }  /* 모바일은 영상 팝업 숨김 */
</style>
</head>
<body>
<div class="wrap">

  <!-- ════ 랜딩 통이미지 (7분할 — 첫 장만 즉시, 나머지 lazy 로드) ════ -->
  <div class="landing">
    <img src="landing_01.jpg" width="1080" height="1600" fetchpriority="high" alt="잡코리아 바이브톤 응시생 모집">
    <img src="landing_02.jpg" width="1080" height="1600" loading="lazy" alt="">
    <img src="landing_03.jpg" width="1080" height="1600" loading="lazy" alt="">
    <img src="landing_04.jpg" width="1080" height="1600" loading="lazy" alt="">
    <img src="landing_05.jpg" width="1080" height="1600" loading="lazy" alt="">
    <img src="landing_06.jpg" width="1080" height="1600" loading="lazy" alt="">
    <img src="landing_07.jpg" width="1080" height="1024" loading="lazy" alt="">
  </div>

  <!-- ════ 신청 버튼 → 신청 페이지 (영상 없는 오픈용) ════ -->
  <div class="apply-sec">
    <a class="apply-btn dimibang" href="apply.html">바이브톤 신청하기 →</a>
  </div>

</div>

<a class="sticky-cta dimibang" id="stickyCta" href="apply.html">바이브톤 신청하기 →</a>

<!-- 우하단 플로팅 (공유 / 맨위로) -->
<div class="fab-stack">
  <button type="button" class="fab fab-top" id="fabTop" aria-label="맨 위로"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
  <button type="button" class="fab" id="fabShare" aria-label="공유하기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg></button>
</div>

<!-- 우측 영상 팝업 (영상 나오면 VIDEO_URL만 넣으면 자동 재생) -->
<div class="vid-pop" id="vidPop">
  <div class="vid-pop-head" id="vidHead"><span><span class="grip">⠿</span>👤내가 장원급제할 상인가?</span><button class="vid-pop-close" id="vidClose" aria-label="닫기">×</button></div>
  <div class="vid-pop-body" id="vidBody">
    <div class="vid-ph">영상 자리 (추후 삽입)</div>
  </div>
</div>

<script>
  // 하단 신청 버튼 보이면 sticky 숨김 (중복 방지)
  const io = new IntersectionObserver(es => {
    es.forEach(e => document.getElementById('stickyCta').classList.toggle('hide', e.isIntersecting));
  }, { threshold:0.3 });
  io.observe(document.querySelector('.apply-sec'));

  // 공유하기 (모바일=공유시트 카톡 등 / 데스크톱=링크 복사)
  function toast(m){ let t=document.getElementById('shareToast'); if(!t){ t=document.createElement('div'); t.id='shareToast'; t.className='toast'; document.body.appendChild(t); } t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
  document.getElementById('fabShare').addEventListener('click', async ()=>{
    const url = location.href.split('?')[0].split('#')[0];
    const data = { title:'잡코리아 바이브톤', text:'AI에게 일 시킬 줄 아는 자, 바이브톤에 응시하라!', url };
    if (navigator.share) { try { await navigator.share(data); } catch(e){} }
    else { try { await navigator.clipboard.writeText(url); toast('링크가 복사되었어요'); } catch(e){ toast('링크: '+url); } }
  });
  // 탭/클릭 시 먹물 자국 퍼짐
  document.addEventListener('pointerdown', e => {
    const s = document.createElement('div'); s.className = 'ink-splat';
    s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
    s.style.setProperty('--s', (38 + Math.random() * 26) + 'px');
    s.style.setProperty('--r', `${40+Math.random()*25}% ${50+Math.random()*30}% ${45+Math.random()*30}% ${55+Math.random()*25}%`);
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('i');
      const a = Math.random() * Math.PI * 2, dist = 20 + Math.random() * 28;
      d.style.setProperty('--dx', Math.cos(a) * dist + 'px');
      d.style.setProperty('--dy', Math.sin(a) * dist + 'px');
      d.style.width = d.style.height = (3 + Math.random() * 5) + 'px';
      s.appendChild(d);
    }
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }, { passive: true });

  // 맨 위로
  const fabTop = document.getElementById('fabTop');
  fabTop.addEventListener('click', ()=>window.scrollTo({top:0, behavior:'smooth'}));
  window.addEventListener('scroll', ()=>fabTop.classList.toggle('show', window.scrollY>300), {passive:true});

  // 영상 팝업 — 영상 나오면 아래 VIDEO_URL에 유튜브 embed 주소만 넣으세요
  const VIDEO_URL = ''; // 영상 제외 버전 — 영상 나오면 index.html 사용
  const vidPop = document.getElementById('vidPop');
  if (VIDEO_URL) {
    const body = document.getElementById('vidBody');
    if (/\.(mp4|mov|webm|m4v)$/i.test(VIDEO_URL)) {
      body.innerHTML = '<video id="popVid" src="'+VIDEO_URL+'" autoplay loop playsinline></video><button class="vid-mute" id="vidMute" aria-label="소리">🔊</button>';
      const v = document.getElementById('popVid'), mb = document.getElementById('vidMute');
      // 자동 소리 ON 시도 → 브라우저가 막으면 음소거로 폴백
      v.muted = false;
      v.play().then(()=>{ mb.textContent = '🔊'; }).catch(()=>{ v.muted = true; mb.textContent = '🔇'; v.play().catch(()=>{}); });
      mb.addEventListener('click', ()=>{ v.muted = !v.muted; mb.textContent = v.muted ? '🔇' : '🔊'; if(!v.muted){ v.play().catch(()=>{}); } });
      // 영상 누르면 멈춤/재생 토글
      v.style.cursor = 'pointer';
      v.addEventListener('click', ()=>{ if(v.paused){ v.play().catch(()=>{}); } else { v.pause(); } });
    } else {
      body.innerHTML = '<iframe src="'+VIDEO_URL+'" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    }
  }
  // 영상 제외 버전: 팝업 완전 숨김
  if (!VIDEO_URL) vidPop.style.display = 'none';
  document.getElementById('vidClose').addEventListener('click', ()=> vidPop.classList.add('hide'));

  // 영상 팝업 드래그 이동 (상단 바 잡고)
  (function makeDraggable(pop, handle){
    let on=false, sx=0, sy=0, ox=0, oy=0;
    function start(e){
      const p = e.touches ? e.touches[0] : e;
      const r = pop.getBoundingClientRect();
      ox = r.left; oy = r.top; sx = p.clientX; sy = p.clientY;
      pop.style.right='auto'; pop.style.bottom='auto'; pop.style.left=ox+'px'; pop.style.top=oy+'px';
      on = true; e.preventDefault();
    }
    function move(e){
      if(!on) return;
      const p = e.touches ? e.touches[0] : e;
      let nx = ox + (p.clientX - sx), ny = oy + (p.clientY - sy);
      // 화면 밖으로 안 나가게 살짝 제한
      nx = Math.max(4, Math.min(nx, window.innerWidth - pop.offsetWidth - 4));
      ny = Math.max(4, Math.min(ny, window.innerHeight - pop.offsetHeight - 4));
      pop.style.left = nx+'px'; pop.style.top = ny+'px';
      if(e.cancelable) e.preventDefault();
    }
    function end(){ on=false; }
    handle.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    handle.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end);
  })(vidPop, document.getElementById('vidHead'));
</script>
</body>
</html>
